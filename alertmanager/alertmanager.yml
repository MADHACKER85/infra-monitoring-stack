global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'log-webhook-placeholder'

receivers:
- name: 'log-webhook-placeholder'
  webhook_configs:
  - url: 'http://localhost:5001/webhook'  # A placeholder endpoint for webhook notifications
    send_resolved: true
